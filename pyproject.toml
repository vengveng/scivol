[build-system]
requires = ["setuptools>=69", "wheel", "numpy>=1.22"]
build-backend = "setuptools.build_meta"

[project]
name            = "volkit"
version         = "0.1.0"
description     = "GARCH helpers in C"
requires-python = ">=3.9"

[tool.setuptools]
packages = [
  "volkit",
  "volkit.components",
  "volkit.spec",
  "volkit.estimators",
  "volkit._kernels",
]

[[tool.setuptools.ext-modules]]
name = "volkit._core"
sources = [
  "volkit/_core.c",
  "volkit/_csrc/volkit_core.c",
  "volkit/_csrc/variance_garch.c"
]
include-dirs       = ["volkit/_csrc"]
extra-compile-args = ["-O3", "-ffast-math"]