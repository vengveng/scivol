[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name            = "volkit"
version         = "0.1.0"
description     = "GARCH helpers in C"
requires-python = ">=3.8"

[tool.setuptools]
package-dir = {"" = "src"}
packages = ["volkit"]

[[tool.setuptools.ext-modules]]
name              = "volkit._core"
sources           = ["src/volkit/_core.c", "core/volkit_core.c"]
include-dirs      = ["core"]
extra-compile-args = ["-O3", "-ffast-math"]